  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--ink:#07142f;--muted:#667085;--line:#d9e2ef;--brand:#10233f;--accent:#37b6a6;--blue:#2563eb;--green:#16a34a;--amber:#d97706;--red:#dc2626;--purple:#6d28d9;--dark:#090e19;--card:#111827;--soft:#eef7f5}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}.brand{display:flex;gap:14px;align-items:center}.logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#5eead4);display:grid;place-items:center;font-weight:900;color:#04111f}.brand h1,.brand strong{margin:0;font-size:1.05rem}.brand span{color:#64748b;font-size:.9rem}.login{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;background:radial-gradient(circle at 20% 20%,#1e3a8a 0,#0b1220 38%,#020617 100%)}.login-hero{color:white;padding:7vw;display:flex;flex-direction:column;justify-content:center}.login-hero h2{font-size:clamp(2.2rem,5vw,4.4rem);line-height:1;margin:24px 0 14px}.login-hero p{font-size:1.1rem;color:#cbd5e1;max-width:640px}.hero-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:36px}.hero-card{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);backdrop-filter:blur(14px);border-radius:22px;padding:18px}.login-box-wrap{display:grid;place-items:center;padding:28px}.login-card{width:min(460px,100%);background:white;border-radius:28px;padding:32px;box-shadow:0 28px 80px rgba(0,0,0,.3)}.field{display:grid;gap:8px;margin:16px 0}.field label{font-weight:800;color:#172033}.field input,.field select{width:100%;min-height:52px;border:1px solid #cbd5e1;border-radius:14px;padding:0 14px;background:#fff}.btn{border:0;border-radius:14px;min-height:48px;padding:0 18px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:10px}.btn-primary{background:var(--brand);color:white}.btn-soft{background:#e8f4f2;color:var(--brand)}.btn-danger{background:#7f1d1d;color:white}.btn-blue{background:#1d4ed8;color:white}.btn-wide{width:100%}.error{color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;border-radius:14px;padding:12px;margin:14px 0}.shell{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.side{background:#10233f;color:white;padding:24px;display:flex;flex-direction:column;gap:20px}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:#dbeafe;text-align:left;border-radius:14px;padding:14px 16px;font-weight:700}.nav button.active,.nav button:hover{background:rgba(255,255,255,.13);color:white}.profile{margin-top:auto;border-top:1px solid rgba(255,255,255,.16);padding-top:16px;color:#cbd5e1}.main{padding:30px;overflow:auto}.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:24px}.title small{color:#64748b;text-transform:uppercase;font-weight:900;letter-spacing:.05em}.title h2{font-size:2rem;margin:6px 0}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:white;border:1px solid #dbe2ed;border-radius:22px;padding:20px;box-shadow:0 14px 40px rgba(16,35,63,.06)}.stat span{color:#64748b;font-weight:700}.stat strong{font-size:2rem;display:block;margin-top:8px}.toolbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin:16px 0}.search{display:flex;gap:8px;background:white;border:1px solid #cbd5e1;border-radius:14px;padding:8px;min-width:min(420px,100%)}.search input{border:0;outline:none;min-height:34px;flex:1}.table{width:100%;overflow:auto;border:1px solid #dbe2ed;border-radius:18px;background:white}.table table{border-collapse:collapse;width:100%;min-width:900px}.table th,.table td{padding:13px 14px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top}.table th{background:#f8fafc;font-size:.84rem;color:#475569}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-weight:900;font-size:.8rem;background:#e5e7eb;color:#334155}.pill.encontrado{background:#dcfce7;color:#166534}.pill.divergente{background:#fef3c7;color:#92400e}.pill.nao_cadastrado{background:#fee2e2;color:#991b1b}.pill.restante{background:#ede9fe;color:#5b21b6}.inv-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}.inv-card{display:grid;gap:12px}.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress b{display:block;height:100%;background:linear-gradient(90deg,#37b6a6,#2563eb)}.modal{position:fixed;inset:0;background:rgba(2,6,23,.6);z-index:50;display:grid;place-items:center;padding:18px}.modal-card{width:min(560px,100%);background:white;border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.35)}.mobile-app{min-height:100vh;background:#070b14;color:white;padding:16px 16px 88px;display:grid;gap:14px}.mobile-head{display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;background:#070b14;padding:4px 0 12px;z-index:3}.mobile-title span{font-size:.75rem;color:#37b6a6;text-transform:uppercase;font-weight:900}.mobile-title strong{display:block}.mobile-card{background:#111827;border:1px solid #2b3548;border-radius:24px;padding:18px}.mobile-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.mobile-kpi{background:#0b1220;border:1px solid #263449;border-radius:18px;padding:14px}.mobile-kpi span{color:#94a3b8;font-size:.8rem}.mobile-kpi strong{display:block;font-size:1.35rem}.scan-btn{width:100%;min-height:96px;border-radius:22px;border:0;background:#1d4ed8;color:white;font-size:1.25rem;font-weight:950;display:flex;justify-content:center;align-items:center;gap:12px}.manual{display:grid;grid-template-columns:1fr 92px;gap:10px}.manual input{min-height:56px;border-radius:16px;border:1px solid #334155;background:#111827;color:white;padding:0 14px}.result{border-radius:22px;padding:18px;background:#111827;border:1px solid #334155}.bottom-nav{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(520px,calc(100vw - 24px));background:rgba(15,23,42,.9);backdrop-filter:blur(16px);border:1px solid #334155;border-radius:24px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);z-index:10}.bottom-nav button{background:transparent;border:0;color:#cbd5e1;border-radius:16px;min-height:48px;font-size:.75rem;font-weight:800}.bottom-nav button.active{background:#37b6a6;color:#06101d}.install-banner{position:fixed;right:18px;bottom:18px;z-index:60;background:#10233f;color:white;border:1px solid #37b6a6;border-radius:18px;padding:16px;box-shadow:0 20px 50px rgba(0,0,0,.25);display:none;gap:12px;max-width:360px}.install-banner.show{display:grid}.scanner{position:fixed;inset:0;background:#020617;z-index:70;display:grid;place-items:center;padding:18px}.scanner video{width:min(640px,100%);border-radius:24px;background:black}.scanner .frame{position:absolute;width:min(480px,80vw);height:180px;border:4px solid #37b6a6;border-radius:24px;box-shadow:0 0 0 999px rgba(0,0,0,.35)}@media(max-width:900px){.login{grid-template-columns:1fr}.login-hero{display:none}.shell{display:block}.side{display:none}.main{padding:16px}.stats{grid-template-columns:repeat(2,1fr)}.desktop-only{display:none!important}.mobile-only{display:block!important}}@media(min-width:901px){.mobile-only{display:none!important}}@media(max-width:520px){.stats{grid-template-columns:1fr}.login-box-wrap{padding:16px}.login-card{padding:22px;border-radius:22px}.manual{grid-template-columns:1fr}.bottom-nav{grid-template-columns:repeat(5,1fr)}}
  </style>

<body>
<div id="app"></div>
<div id="installBanner" class="install-banner"><strong>Instalar aplicativo</strong><span>Acesse como app no celular, com tela cheia e atalho.</span><button class="btn btn-soft" id="installBtn">Instalar</button></div>
<script>
const ALLOWED_CONTAS=["255","256","259","590"];
const $=(id)=>document.getElementById(id);
const app=$('app');
const sb=window.supabase.createClient(window.SUPABASE_URL,window.SUPABASE_ANON_KEY);
let session=null, profile=null, route='dashboard', mobileTab='home', activeInventory=null, recent=[], deferredPrompt=null;
function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function toast(msg){alert(msg)}
function normalizePlaqueta(v){return String(v??'').trim().replace(/\D/g,'').replace(/^0+/,'')||String(v??'').trim()}
function setHTML(id,html){const el=$(id); if(el) el.innerHTML=html}
function fmt(n){return Number(n||0).toLocaleString('pt-BR')}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('installBanner')?.classList.add('show')});
$('installBtn')?.addEventListener('click',async()=>{if(deferredPrompt){await deferredPrompt.prompt();deferredPrompt=null;$('installBanner')?.classList.remove('show')}else toast('No Android/Chrome use o menu do navegador: Adicionar à tela inicial.')});
if('serviceWorker' in navigator){try{navigator.serviceWorker.register('/sw.js')}catch(e){}}
async function init(){const r=await sb.auth.getSession(); session=r.data.session; if(session) await loadProfile(); render();}
async function loadProfile(){const u=session?.user; if(!u)return; const {data}=await sb.from('profiles').select('*').eq('id',u.id).maybeSingle(); profile=data||{id:u.id,nome:u.email,papel:'consulta',status:'ativo'}; if(profile.papel!=='administrador') route='mobile';}
function render(){if(!session)return loginView(); if(route==='mobile') return mobileView(); return shellView();}
function loginView(){app.innerHTML=`<section class="login"><div class="login-hero"><div class="brand"><div class="logo">IP</div><div><h1>Inventário Patrimonial</h1><span>Operação corporativa de ativos</span></div></div><h2>Controle patrimonial com leitura mobile.</h2><p>Inventários em tempo real, relatórios profissionais, scanner de plaquetas e auditoria integrada ao Supabase.</p><div class="hero-grid"><div class="hero-card">✓ Scanner mobile</div><div class="hero-card">✓ Relatórios PDF/Excel</div><div class="hero-card">✓ RLS e autenticação</div><div class="hero-card">✓ Dashboard executivo</div></div></div><div class="login-box-wrap"><div class="login-card"><div class="brand"><div class="logo">IP</div><div><strong>Entrar no sistema</strong><span>Ambiente seguro Supabase</span></div></div><div id="loginError"></div><div class="field"><label>E-mail</label><input id="email" type="email" autocomplete="email"></div><div class="field"><label>Senha</label><input id="senha" type="password" autocomplete="current-password"></div><button class="btn btn-primary btn-wide" onclick="login()">Entrar</button><button class="btn btn-soft btn-wide" style="margin-top:12px" onclick="cadastroView()">Novo cadastro</button></div></div></section>`}
function cadastroView(){app.innerHTML=`<section class="login"><div class="login-hero"><div class="brand"><div class="logo">IP</div><div><h1>Inventário Patrimonial</h1><span>Solicitação de acesso</span></div></div><h2>Cadastro com aprovação administrativa.</h2><p>Após o cadastro, o administrador aprova seu perfil na tela de usuários.</p></div><div class="login-box-wrap"><div class="login-card"><div class="brand"><div class="logo">IP</div><div><strong>Novo cadastro</strong><span>Solicitar acesso</span></div></div><div id="loginError"></div><div class="field"><label>Nome</label><input id="nome"></div><div class="field"><label>Cargo / função</label><input id="cargo"></div><div class="field"><label>Loja ou setor</label><input id="setor"></div><div class="field"><label>E-mail</label><input id="email" type="email"></div><div class="field"><label>Senha</label><input id="senha" type="password"></div><button class="btn btn-primary btn-wide" onclick="signup()">Cadastrar</button><button class="btn btn-soft btn-wide" style="margin-top:12px" onclick="loginView()">Voltar para login</button></div></div></section>`}
async function login(){setHTML('loginError',''); const email=$('email').value.trim(), password=$('senha').value; const {data,error}=await sb.auth.signInWithPassword({email,password}); if(error)return setHTML('loginError',`<div class="error">${esc(error.message)}</div>`); session=data.session; await loadProfile(); render();}
async function signup(){const email=$('email').value.trim(), password=$('senha').value; const meta={nome:$('nome').value,cargo:$('cargo').value,setor:$('setor').value}; const {error}=await sb.auth.signUp({email,password,options:{data:meta}}); if(error)return setHTML('loginError',`<div class="error">${esc(error.message)}</div>`); setHTML('loginError',`<div class="card" style="background:#dcfce7;color:#166534">Cadastro enviado. Aguarde aprovação.</div>`)}
async function logout(){await sb.auth.signOut();session=null;profile=null;render()}
function shellView(){app.innerHTML=`<div class="shell"><aside class="side"><div class="brand"><div class="logo">IP</div><div><strong>Inventário</strong><span>Patrimônio corporativo</span></div></div><nav class="nav"><button class="${route==='dashboard'?'active':''}" onclick="go('dashboard')">Dashboard</button><button class="${route==='bens'?'active':''}" onclick="go('bens')">Bens</button><button class="${route==='inventarios'?'active':''}" onclick="go('inventarios')">Inventários</button><button onclick="go('mobile')">Mobile</button><button class="${route==='usuarios'?'active':''}" onclick="go('usuarios')">Usuários</button></nav><div class="profile"><b>${esc(profile?.nome||session.user.email)}</b><br>${esc(profile?.papel||'')}</div></aside><main class="main"><div id="page"></div></main></div>`; loadPage()}
function go(r){route=r; render()}
async function loadPage(){if(route==='dashboard')dashboard(); if(route==='bens')bens(); if(route==='inventarios')inventarios(); if(route==='usuarios')usuarios();}
async function dashboard(){setHTML('page',`<div class="topbar"><div class="title"><small>Visão executiva</small><h2>Dashboard</h2></div><button class="btn btn-soft" onclick="dashboard()">Atualizar</button></div><div id="stats" class="grid stats"></div><div class="card"><h3>Inventários recentes</h3><div id="recentInv"></div></div>`); const [bensC,inv,leit]=await Promise.all([sb.from('bens_imobilizado').select('cod',{count:'exact',head:true}).in('c_contabil',ALLOWED_CONTAS),sb.from('inventarios').select('*').order('created_at',{ascending:false}).limit(6),sb.from('inventario_resumo').select('*').limit(20)]); const rows=leit.data||[]; const totals=rows.reduce((a,r)=>{a.encontrado+=Number(r.encontrados||r.encontrado||0);a.divergente+=Number(r.divergentes||r.divergente||0);a.nao+=Number(r.nao_cadastrados||r.nao_cadastrado||0);a.restante+=Number(r.restantes||r.restante||0);return a},{encontrado:0,divergente:0,nao:0,restante:0}); setHTML('stats',`<div class="card stat"><span>Bens ativos</span><strong>${fmt(bensC.count)}</strong></div><div class="card stat"><span>Encontrados</span><strong>${fmt(totals.encontrado)}</strong></div><div class="card stat"><span>Divergentes</span><strong>${fmt(totals.divergente)}</strong></div><div class="card stat"><span>Restantes</span><strong>${fmt(totals.restante)}</strong></div>`); setHTML('recentInv',(inv.data||[]).map(i=>`<div class="card" style="margin:10px 0"><b>${esc(i.nome||'Inventário')}</b><br><span>${esc(i.loja||'')} Filial ${esc(i.filial||'')} CC ${esc(i.cc||'')}</span></div>`).join('')||'Nenhum inventário.');}
async function bens(){setHTML('page',`<div class="topbar"><div class="title"><small>Base patrimonial</small><h2>Lista de bens</h2></div></div><div class="toolbar"><div class="search"><input id="qBens" placeholder="Buscar plaqueta com ou sem zero"><button class="btn btn-soft" onclick="loadBens()">Buscar</button></div></div><div class="table"><table><thead><tr><th>Cód.</th><th>Plaqueta</th><th>Descrição</th><th>Loja</th><th>Filial</th><th>CC</th><th>C. Contábil</th><th>Status</th></tr></thead><tbody id="bensRows"></tbody></table></div>`); loadBens();}
async function loadBens(){const q=normalizePlaqueta($('qBens')?.value||''); let query=sb.from('bens_imobilizado').select('cod,plaq,"desc",loja_db,filial,cc,c_contabil,status').in('c_contabil',ALLOWED_CONTAS).order('plaq').limit(100); if(q) query=query.or(`plaq.eq.${q},plaq.ilike.%${q}%`); const {data,error}=await query; if(error)return setHTML('bensRows',`<tr><td colspan="8">${esc(error.message)}</td></tr>`); setHTML('bensRows',(data||[]).map(b=>`<tr><td>${esc(b.cod)}</td><td><b>${esc(b.plaq)}</b></td><td>${esc(b.desc)}</td><td>${esc(b.loja_db)}</td><td>${esc(b.filial)}</td><td>${esc(b.cc)}</td><td>${esc(b.c_contabil)}</td><td>${esc(b.status)}</td></tr>`).join('')||'<tr><td colspan="8">Nenhum bem encontrado.</td></tr>')}
async function inventarios(){setHTML('page',`<div class="topbar"><div class="title"><small>Gestão operacional</small><h2>Inventários</h2></div><button class="btn btn-primary" onclick="openCreateInventory()">Criar inventário</button></div><div id="invList" class="grid inv-grid"></div>`); loadInventarios()}
async function loadInventarios(){const {data,error}=await sb.from('inventarios').select('*').order('created_at',{ascending:false}).limit(50); if(error)return setHTML('invList',`<div class="error">${esc(error.message)}</div>`); setHTML('invList',(data||[]).map(i=>{const done=Number(i.total_lido||0), exp=Number(i.total_esperado||0), pct=exp?Math.round(done/exp*100):0; return `<div class="card inv-card"><div><b>${esc(i.nome||'Inventário')}</b><br><span>${esc(i.loja||'')} • Filial ${esc(i.filial||'')} • CC ${esc(i.cc||'')}</span></div><div class="progress"><b style="width:${pct}%"></b></div><small>${pct}% concluído • ${fmt(done)} / ${fmt(exp)}</small><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-soft" onclick="selectInventory('${i.id}')">Abrir no Mobile</button><button class="btn btn-blue" onclick="exportReport('${i.id}','pdf')">PDF</button><button class="btn btn-soft" onclick="exportReport('${i.id}','xlsx')">Excel</button><button class="btn btn-danger" onclick="deleteInventory('${i.id}')">Excluir</button></div></div>`}).join('')||'<div class="card">Nenhum inventário criado.</div>')}
async function openCreateInventory(){const {data}=await sb.from('inventario_opcoes_filiais').select('*').order('loja').limit(500); const opts=(data||[]).map(f=>`<option value="${esc(JSON.stringify(f))}">Loja ${esc(f.loja)} • Filial ${esc(f.filial)} • CC ${esc(f.cc)} • ${esc(f.descricao||'')}</option>`).join(''); document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="modal"><div class="modal-card"><h2>Criar inventário</h2><div class="field"><label>Loja / Filial / CC</label><select id="filialOpt">${opts}</select></div><button class="btn btn-primary btn-wide" onclick="createInventory()">Criar</button><button class="btn btn-soft btn-wide" style="margin-top:10px" onclick="$('modal').remove()">Cancelar</button></div></div>`)}
async function createInventory(){const f=JSON.parse($('filialOpt').value); const nome=`Inventário Loja ${f.loja} - Filial ${f.filial} - CC ${f.cc}`; const {error}=await sb.from('inventarios').insert({nome,loja:String(f.loja??''),filial:String(f.filial??''),cc:String(f.cc??''),setor:f.descricao||'',status:'aberto',responsavel_id:session.user.id}); if(error)return toast(error.message); $('modal').remove(); inventarios();}
async function deleteInventory(id){if(!confirm('Excluir inventário e todos os dados vinculados?'))return; const {error}=await sb.from('inventarios').delete().eq('id',id); if(error)toast(error.message); else inventarios();}
function selectInventory(id){activeInventory=id; route='mobile'; render();}
async function usuarios(){setHTML('page',`<div class="topbar"><div class="title"><small>Administração</small><h2>Usuários</h2></div></div><div class="table"><table><thead><tr><th>Nome</th><th>Email</th><th>Perfil</th><th>Status</th></tr></thead><tbody id="userRows"></tbody></table></div>`); const {data,error}=await sb.from('profiles').select('*').limit(200); if(error)return setHTML('userRows',`<tr><td colspan="4">${esc(error.message)}</td></tr>`); setHTML('userRows',(data||[]).map(u=>`<tr><td>${esc(u.nome)}</td><td>${esc(u.email)}</td><td>${esc(u.papel)}</td><td>${esc(u.status)}</td></tr>`).join(''))}
async function mobileView(){app.innerHTML=`<section class="mobile-app"><div class="mobile-head"><div class="brand"><div class="logo">IP</div><div class="mobile-title"><span>Patrimônio Mobile</span><strong>${esc(profile?.nome||session.user.email)}</strong></div></div><button class="btn btn-soft" onclick="logout()">Sair</button></div><div id="mobileContent"></div><nav class="bottom-nav"><button class="${mobileTab==='home'?'active':''}" onclick="mTab('home')">Início</button><button class="${mobileTab==='inventarios'?'active':''}" onclick="mTab('inventarios')">Inventários</button><button class="${mobileTab==='scanner'?'active':''}" onclick="mTab('scanner')">Scanner</button><button class="${mobileTab==='relatorios'?'active':''}" onclick="mTab('relatorios')">Relatórios</button><button onclick="notifyMe()">Alertas</button></nav></section>`; renderMobileTab()}
function mTab(t){mobileTab=t; renderMobileTab()}
async function renderMobileTab(){const c=$('mobileContent'); if(!c)return; if(mobileTab==='home'){c.innerHTML=`<div class="mobile-card"><h2>Operação de Inventário</h2><p style="color:#cbd5e1">Escolha um inventário, leia plaquetas e acompanhe o progresso em tempo real.</p><button class="scan-btn" onclick="mTab('scanner')">Ler Plaqueta</button></div><div class="mobile-kpis"><div class="mobile-kpi"><span>Últimas leituras</span><strong>${recent.length}</strong></div><div class="mobile-kpi"><span>Inventário</span><strong>${activeInventory?'Ativo':'-'} </strong></div></div>`} if(mobileTab==='inventarios'){c.innerHTML=`<div class="mobile-card"><button class="btn btn-primary btn-wide" onclick="openCreateInventory()">Criar Inventário</button></div><div id="mobInv"></div>`; const {data}=await sb.from('inventarios').select('*').order('created_at',{ascending:false}).limit(20); setHTML('mobInv',(data||[]).map(i=>`<div class="mobile-card" style="margin-top:12px"><b>${esc(i.nome)}</b><br><span style="color:#94a3b8">Filial ${esc(i.filial)} • CC ${esc(i.cc)}</span><button class="btn btn-soft btn-wide" style="margin-top:10px" onclick="activeInventory='${i.id}';mTab('scanner')">Usar este inventário</button></div>`).join(''))} if(mobileTab==='scanner'){c.innerHTML=`<div class="mobile-card"><button class="scan-btn" onclick="openScanner()">▣ Ler Plaqueta</button></div><div class="manual"><input id="manualPlaqueta" placeholder="Digitar plaqueta"><button class="btn btn-soft" onclick="saveReading($('manualPlaqueta').value)">Salvar</button></div><div id="scanResult" class="result"><b>Aguardando leitura</b><p>Câmera ou digitação manual disponível.</p></div><div class="mobile-card"><button class="btn btn-danger btn-wide" onclick="finishInventory()">Finalizar inventário</button></div><div id="recentReadings"></div>`; renderRecent()} if(mobileTab==='relatorios'){c.innerHTML=`<div class="mobile-card"><h3>Relatórios</h3><button class="btn btn-blue btn-wide" onclick="exportReport(activeInventory,'pdf')">Exportar PDF</button><button class="btn btn-soft btn-wide" style="margin-top:10px" onclick="exportReport(activeInventory,'xlsx')">Exportar Excel</button></div>`}}
function renderRecent(){setHTML('recentReadings',recent.map(r=>`<div class="mobile-card"><b>${esc(r.plaqueta_lida)}</b><br><span class="pill ${esc(r.resultado)}">${esc(r.resultado)}</span></div>`).join(''))}
async function openScanner(){if(!navigator.mediaDevices?.getUserMedia)return toast('Câmera indisponível.'); const overlay=document.createElement('div'); overlay.className='scanner'; overlay.innerHTML=`<video id="video" autoplay playsinline></video><div class="frame"></div><button class="btn btn-danger" style="position:absolute;top:20px;right:20px" onclick="closeScanner()">Fechar</button>`; document.body.appendChild(overlay); window._scannerOverlay=overlay; const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); const video=$('video'); video.srcObject=stream; if('BarcodeDetector' in window){const detector=new BarcodeDetector({formats:['code_128','code_39','ean_13','itf']}); window._scanTimer=setInterval(async()=>{try{const codes=await detector.detect(video); if(codes.length){const val=codes[0].rawValue; closeScanner(); saveReading(val)}}catch(e){}},700)} else toast('Detector nativo indisponível. Use digitação manual.');}
function closeScanner(){clearInterval(window._scanTimer); const v=$('video'); if(v?.srcObject) v.srcObject.getTracks().forEach(t=>t.stop()); window._scannerOverlay?.remove();}
async function saveReading(raw){const plaqueta=String(raw||'').trim(); if(!plaqueta)return; if(!activeInventory)return toast('Selecione um inventário primeiro.'); const {data,error}=await sb.rpc('registrar_leitura_inventario',{p_inventario_id:activeInventory,p_plaqueta:plaqueta}); if(error)return setHTML('scanResult',`<div class="error">${esc(error.message)}</div>`); const row=Array.isArray(data)?data[0]:data; const r={plaqueta_lida:plaqueta,resultado:row?.resultado||'encontrado'}; recent.unshift(r); recent=recent.slice(0,8); setHTML('scanResult',`<b>${esc(plaqueta)}</b><br><span class="pill ${esc(r.resultado)}">${esc(r.resultado)}</span>`); try{navigator.vibrate?.(r.resultado==='encontrado'?80:[120,80,120])}catch(e){} renderRecent();}
async function finishInventory(){if(!activeInventory)return toast('Selecione um inventário.'); const {error}=await sb.from('inventarios').update({status:'finalizado',finalizado_em:new Date().toISOString()}).eq('id',activeInventory); if(error)return toast(error.message); if(confirm('Inventário finalizado. Deseja exportar relatório agora?')) exportReport(activeInventory,'pdf')}
async function exportReport(inventarioId,type){if(!inventarioId)return toast('Selecione um inventário.'); const {data,error}=await sb.from('relatorio_inventario_completo').select('*').eq('inventario_id',inventarioId).limit(5000); if(error)return toast(error.message); const rows=data||[]; if(type==='xlsx'){const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Inventário'); XLSX.writeFile(wb,'relatorio_inventario.xlsx'); return} const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'landscape'}); doc.setFontSize(18); doc.text('Relatório de Inventário Patrimonial',14,16); doc.setFontSize(10); doc.text('Drogaria Globo • Operação patrimonial corporativa',14,23); const summary=rows.reduce((a,r)=>{a[r.resultado||'outros']=(a[r.resultado||'outros']||0)+1;return a},{}); doc.text(`Encontrados: ${summary.encontrado||0} | Divergentes: ${summary.divergente||0} | Não cadastrados: ${summary.nao_cadastrado||0} | Restantes: ${summary.restante||0}`,14,31); doc.autoTable({startY:38,head:[['Plaqueta','Descrição','Resultado','Loja Esp.','Filial Esp.','CC Esp.','Loja Enc.','Filial Enc.','CC Enc.','Observações']],body:rows.slice(0,1200).map(r=>[r.plaqueta||r.plaqueta_lida||'',r.descricao||'',r.resultado||'',r.loja_esperada||'',r.filial_esperada||'',r.cc_esperado||'',r.loja_encontrada||'',r.filial_encontrada||'',r.cc_encontrado||'',r.observacoes||'']),styles:{fontSize:7,cellPadding:2},headStyles:{fillColor:[16,35,63]}}); doc.save('relatorio_inventario.pdf')}
async function notifyMe(){if(!('Notification' in window))return toast('Notificações indisponíveis.'); const p=await Notification.requestPermission(); if(p==='granted')new Notification('Inventário Patrimonial',{body:'Notificações ativadas para o aplicativo.'}); else toast('Permissão de notificação negada.')}
init();
</script>
</body>
