<style>
:root{font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:#071a35;background:#f4f7fb}*{box-sizing:border-box}body{margin:0}button,input,select{font:inherit}button{cursor:pointer}.shell{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.sidebar{background:#10233f;color:#fff;padding:24px;display:flex;flex-direction:column;gap:20px}.brand{display:flex;gap:12px;align-items:center}.brand-mark{width:44px;height:44px;border-radius:9px;background:#3bbcaf;color:#071a35;display:grid;place-items:center;font-weight:900}.muted{color:#71819a}.sidebar .muted{color:#c0ccdc}.nav{display:grid;gap:8px}.nav button{border:0;border-radius:10px;background:transparent;color:#e9f1fb;text-align:left;padding:12px}.nav button.active,.nav button:hover{background:rgba(255,255,255,.13)}.profile{margin-top:auto;border-top:1px solid rgba(255,255,255,.18);padding-top:18px}.content{padding:30px;overflow:auto}.card,.panel,.login-box{background:#fff;border:1px solid #dbe3ef;border-radius:14px;box-shadow:0 10px 30px rgba(16,35,63,.06)}.panel{padding:20px;margin-bottom:18px}.page-title h1{margin:.2rem 0 1rem;font-size:2rem}.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(5,minmax(130px,1fr))}.stat{padding:18px}.stat strong{display:block;font-size:1.9rem;margin-top:6px}.toolbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}input,select{min-height:44px;border:1px solid #cbd7e6;border-radius:10px;padding:0 12px;background:#fff;color:#071a35}.btn{min-height:44px;border:0;border-radius:10px;padding:0 16px;font-weight:800}.primary{background:#10233f;color:white}.secondary{background:#e8f4f2;color:#10233f}.danger{background:#8d1d1d;color:#fff}.success{background:#37b6a6;color:#06101d}.table-wrap{overflow:auto;border:1px solid #dbe3ef;border-radius:12px;background:#fff}table{width:100%;border-collapse:collapse;min-width:920px}th,td{padding:12px 14px;border-bottom:1px solid #edf1f7;text-align:left;vertical-align:top}th{background:#f0f4f9;font-size:.86rem}.pill{display:inline-flex;border-radius:999px;padding:4px 10px;font-weight:800;background:#e9eef6}.pill.encontrado{background:#dff7eb;color:#126b3f}.pill.divergente{background:#fff1d7;color:#8a4c00}.pill.nao_cadastrado{background:#ffe2e2;color:#9b1c1c}.pill.restante{background:#e0e7ff;color:#3730a3}.tabs{display:flex;gap:8px;margin:0 0 16px;flex-wrap:wrap}.tabs button{border:1px solid #cbd7e6;background:white;border-radius:10px;min-height:40px;padding:0 12px}.tabs button.active{background:#10233f;color:#fff}.login-page{min-height:100vh;display:grid;place-items:center;padding:18px}.login-box{width:min(440px,100%);padding:28px}.form{display:grid;gap:14px}.error{color:#b71919}.ok{color:#126b3f}.mobile{max-width:430px;min-height:100vh;margin:0 auto;background:#0b0b0f;color:#f8fafc;padding:14px 14px 110px;box-shadow:0 0 0 100vmax #0b0b0f;clip-path:inset(0 -100vmax)}.mobile .panel{background:#161821;border-color:#303442;color:#fff}.mobile input,.mobile select{background:#161821;color:#fff;border-color:#303442}.mobile-head{position:sticky;top:0;background:#0b0b0f;z-index:5;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding-bottom:10px}.mobile-actions{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(430px,calc(100vw - 20px));display:grid;grid-template-columns:1fr 1fr;gap:10px;background:rgba(11,11,15,.92);border:1px solid #303442;border-radius:18px;padding:10px;z-index:10}.scan-box{padding:8px;border-radius:18px;background:#161821;border:1px solid #303442}.scan-button{width:100%;min-height:96px;border:0;border-radius:14px;background:#2851dc;color:#fff;font-size:1.25rem;font-weight:900;display:flex;align-items:center;justify-content:center;gap:10px}.recent{display:grid;gap:8px}.recent-item{background:#161821;border:1px solid #303442;border-radius:10px;padding:12px;display:flex;justify-content:space-between}.install-button-floating{position:fixed;right:20px;bottom:20px;z-index:9999;padding:14px 18px;border-radius:12px;border:0;background:#10233f;color:#fff;font-weight:800;box-shadow:0 6px 18px rgba(0,0,0,.25)}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:grid;place-items:center;z-index:50;padding:16px}.modal{background:#fff;color:#071a35;border-radius:16px;padding:22px;max-width:520px;width:100%;box-shadow:0 22px 60px rgba(0,0,0,.3)}@media(max-width:900px){.shell{grid-template-columns:1fr}.sidebar{display:none}.content{padding:16px}.stats{grid-template-columns:1fr 1fr}.mobile{max-width:100%}}

<script>
(function setupManifest(){
 const svg = encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" fill="#3bbcaf"/><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="170" font-weight="900" fill="#071a35">IP</text></svg>');
 const icon = "data:image/svg+xml;charset=utf-8," + svg;
 const manifest = {name:"Patrimônio Mobile",short_name:"Patrimônio",description:"Inventário patrimonial corporativo.",start_url:"/mobile",display:"standalone",background_color:"#0b0b0f",theme_color:"#0b0b0f",orientation:"portrait",icons:[{src:icon,sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"},{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
 const blob = new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
 const link = document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(blob); document.head.appendChild(link);
})();
</script>
<script>
const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const contasPermitidas = ["255","256","259","590"];
const $ = (id)=>document.getElementById(id);
const state = { user:null, profile:null, page:location.pathname.includes("mobile")?"mobile":"dashboard", inventories:[], currentInventory:null, deferredPrompt:null };
window.addEventListener("beforeinstallprompt",(e)=>{e.preventDefault();state.deferredPrompt=e;renderInstallButton();});
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function onlyDigits(v){return String(v??"").replace(/\D/g,"");}
function normalizePlaqueta(v){const d=onlyDigits(v); return d.replace(/^0+/,"") || d;}
function isAdmin(){return state.profile?.role==="administrador" || state.profile?.papel==="administrador" || state.profile?.perfil==="administrador";}
function roleName(){return state.profile?.role || state.profile?.papel || state.profile?.perfil || "usuário";}
async function init(){
 const {data:{session}} = await sb.auth.getSession();
 state.user = session?.user || null;
 if(state.user) await loadProfile();
 render();
}
async function loadProfile(){
 const {data} = await sb.from("profiles").select("*").eq("id",state.user.id).maybeSingle();
 state.profile = data || {nome: state.user.email, role:"consulta"};
 if(!isAdmin()) state.page="mobile";
}
function navigate(p){state.page=p; history.replaceState(null,"",p==="mobile"?"/mobile":"/"); render();}
function render(){
 if(!state.user) return renderLogin();
 if(!isAdmin() || state.page==="mobile") return renderMobile();
 return renderShell();
}
function renderLogin(){
 $("app").innerHTML = `<main class="login-page"><section class="login-box">
 <div class="brand"><div class="brand-mark">IP</div><div><strong>Inventário Patrimonial</strong><div class="muted">Operação online com Supabase</div></div></div><br>
 <div id="authMsg"></div>
 <div id="loginForm" class="form">
  <label>E-mail<input id="email" type="email"></label>
  <label>Senha<input id="pass" type="password"></label>
  <button class="btn primary" onclick="login()">Entrar</button>
  <button class="btn secondary" onclick="showSignup()">Novo Cadastro</button>
 </div>
 </section></main>`;
}
function showSignup(){
 $("loginForm").innerHTML = `<div class="form">
 <label>Nome<input id="name"></label><label>Cargo / função<input id="cargo"></label><label>Loja ou setor<input id="setor"></label>
 <label>E-mail<input id="email" type="email"></label><label>Senha<input id="pass" type="password"></label><label>Confirmar senha<input id="pass2" type="password"></label>
 <button class="btn primary" onclick="signup()">Cadastrar</button><button class="btn secondary" onclick="renderLogin()">Voltar para login</button></div>`;
}
async function login(){
 const {data,error}=await sb.auth.signInWithPassword({email:$("email").value,password:$("pass").value});
 if(error) return $("authMsg").innerHTML=`<p class="error">${esc(error.message)}</p>`;
 state.user=data.user; await loadProfile(); render();
}
async function signup(){
 if($("pass").value!==$("pass2").value) return $("authMsg").innerHTML=`<p class="error">As senhas não conferem.</p>`;
 const {data,error}=await sb.auth.signUp({email:$("email").value,password:$("pass").value,options:{data:{nome:$("name").value,cargo:$("cargo").value,setor:$("setor").value}}});
 if(error) return $("authMsg").innerHTML=`<p class="error">${esc(error.message)}</p>`;
 $("authMsg").innerHTML=`<p class="ok">Cadastro solicitado. Aguarde aprovação do administrador.</p>`;
}
async function logout(){await sb.auth.signOut(); state.user=null; state.profile=null; renderLogin();}
function renderShell(){
 const nav=["dashboard","bens","importar","inventarios","mobile","usuarios","config"];
 $("app").innerHTML = `<div class="shell"><aside class="sidebar">
 <div class="brand"><div class="brand-mark">IP</div><div><strong>Inventário</strong><div class="muted">Patrimônio corporativo</div></div></div>
 <nav class="nav">${nav.map(n=>`<button class="${state.page===n?'active':''}" onclick="navigate('${n}')">${labelPage(n)}</button>`).join("")}</nav>
 <div class="profile"><strong>${esc(state.profile?.nome||state.user.email)}</strong><div class="muted">${esc(roleName())}</div><br><button class="btn secondary" onclick="logout()">Sair</button></div>
 </aside><main class="content" id="main"></main></div>`;
 if(state.page==="dashboard") dashboard();
 if(state.page==="bens") bens();
 if(state.page==="importar") importar();
 if(state.page==="inventarios") inventarios();
 if(state.page==="usuarios") usuarios();
 if(state.page==="config") config();
 if(state.page==="mobile") renderMobile();
}
function labelPage(p){return {dashboard:"Dashboard",bens:"Bens",importar:"Importar",inventarios:"Inventários",mobile:"Mobile",usuarios:"Usuários",config:"Configurações"}[p]||p;}
async function dashboard(){
 $("main").innerHTML=`<div class="page-title"><span class="muted">Visão geral</span><h1>Dashboard</h1></div><div id="dash">Carregando...</div>`;
 let resumo=[], rel=[];
 try { resumo=(await sb.from("inventario_resumo").select("*")).data || []; } catch(e){}
 try { rel=(await sb.from("relatorio_inventario_completo").select("resultado")).data || []; } catch(e){}
 const count = (r)=>rel.filter(x=>x.resultado===r).length;
 $("dash").innerHTML = `<div class="grid stats">
 ${stat("Inventários",resumo.length)}${stat("Encontrados",count("encontrado"))}${stat("Divergentes",count("divergente"))}${stat("Não cadastrados",count("nao_cadastrado"))}${stat("Restantes",count("restante"))}
 </div><section class="panel"><h2>Últimos inventários</h2><div class="table-wrap"><table><thead><tr><th>Loja</th><th>Filial</th><th>CC</th><th>Status</th><th>Progresso</th></tr></thead><tbody>${resumo.slice(0,20).map(i=>`<tr><td>${esc(i.loja??i.loja_db??"")}</td><td>${esc(i.filial??"")}</td><td>${esc(i.cc??i.centro_custo??"")}</td><td>${esc(i.status??"")}</td><td>${esc(i.percentual_concluido??i.percentual??"")} %</td></tr>`).join("")}</tbody></table></div></section>`;
}
function stat(t,v){return `<div class="card stat"><span class="muted">${t}</span><strong>${v??0}</strong></div>`}
async function bens(){
 $("main").innerHTML=`<div class="page-title"><span class="muted">Base patrimonial</span><h1>Lista de bens</h1></div>
 <section class="panel"><div class="toolbar"><div class="row"><input id="buscaBem" placeholder="Buscar plaqueta/código"><button class="btn secondary" onclick="loadBens()">Buscar</button></div><span id="bensCount"></span></div></section>
 <div id="bensTable">Carregando...</div>`;
 await loadBens();
}
async function loadBens(){
 const q=$("buscaBem")?.value?.trim()||"";
 let query=sb.from("bens_imobilizado").select('cod,plaq,"desc",loja_db,filial,cc,c_contabil,status', {count:"exact"}).in("c_contabil",contasPermitidas).order("plaq",{ascending:true}).limit(100);
 if(q){ const n=normalizePlaqueta(q); query=query.or(`plaq.ilike.%${q}%,cod.ilike.%${q}%,plaq.ilike.%${n}%`); }
 const {data,error,count}=await query;
 if(error) return $("bensTable").innerHTML=`<p class="error">${esc(error.message)}</p>`;
 $("bensCount").textContent = `${count??data.length} registros`;
 $("bensTable").innerHTML=`<div class="table-wrap"><table><thead><tr><th>Código</th><th>Plaqueta</th><th>Descrição</th><th>Loja</th><th>Filial</th><th>CC</th><th>C. Contábil</th><th>Status</th></tr></thead><tbody>${data.map(b=>`<tr><td>${esc(b.cod)}</td><td>${esc(b.plaq)}</td><td>${esc(b.desc)}</td><td>${esc(b.loja_db)}</td><td>${esc(b.filial)}</td><td>${esc(b.cc)}</td><td>${esc(b.c_contabil)}</td><td>${esc(b.status)}</td></tr>`).join("")}</tbody></table></div>`;
}
function importar(){
 $("main").innerHTML=`<div class="page-title"><span class="muted">Importação</span><h1>Importar Base Patrimonial</h1></div><section class="panel"><p>Importe arquivos Excel/CSV. Somente contas contábeis ${contasPermitidas.join(", ")} serão consideradas.</p><input type="file" id="fileImp" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importFile()">Importar</button><div id="impOut"></div></section>`;
}
async function importFile(){
 const f=$("fileImp").files[0]; if(!f)return;
 $("impOut").innerHTML="Processando...";
 const buf=await f.arrayBuffer(); const wb=XLSX.read(buf); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
 const normalized=rows.map(r=>{
  const get=(names)=>names.map(n=>r[n]).find(v=>v!==undefined&&v!==null&&String(v).trim()!=="");
  const c=onlyDigits(get(["C.Contábil","C. Contábil","c_contabil","C.CONTÁBIL"])||"");
  if(!contasPermitidas.includes(c)) return null;
  return {cod:String(get(["cod","Código","COD","Cod"])||get(["Plaqueta","plaq","Plaqueta"])||""),plaq:String(get(["Plaqueta","plaq","PLAQ","Plaqueta"])||""),desc:String(get(["Descrição","desc","DESC"])||""),data_aq:get(["data_aq","Data Aquisição"]),cc:Number(onlyDigits(get(["cc","CC","Centro de custo","C.Custo"])||""))||null,nf:String(get(["NF","nf"])||""),filial:Number(onlyDigits(get(["filial","Filial"])||""))||null,loja_db:String(get(["loja_db","Loja","loja"])||""),c_contabil:c,status:"ativo"};
 }).filter(Boolean);
 const {error}=await sb.from("bens_imobilizado").upsert(normalized,{onConflict:"cod"});
 $("impOut").innerHTML = error?`<p class="error">${esc(error.message)}</p>`:`<p class="ok">${normalized.length} bens importados/atualizados.</p>`;
}
async function inventarios(){
 $("main").innerHTML=`<div class="page-title"><span class="muted">Inventários</span><h1>Gestão de Inventários</h1></div>
 <div class="tabs"><button class="active" onclick="invTab('lista')">Inventários</button><button onclick="invTab('criar')">Criar inventário</button><button onclick="invTab('rel')">Relatórios</button></div><div id="invArea"></div>`;
 invTab("lista");
}
async function invTab(tab){
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 if(event?.target) event.target.classList.add("active");
 if(tab==="lista") return loadInventariosList();
 if(tab==="criar") return renderCreateInventory("invArea");
 if(tab==="rel") return renderReports();
}
async function loadInventarios(){
 const {data,error}=await sb.from("inventarios").select("*").order("created_at",{ascending:false});
 state.inventories=data||[]; return {data,error};
}
async function loadInventariosList(){
 $("invArea").innerHTML="Carregando...";
 const {data,error}=await loadInventarios();
 if(error) return $("invArea").innerHTML=`<p class="error">${esc(error.message)}</p>`;
 $("invArea").innerHTML=`<section class="panel"><div class="table-wrap"><table><thead><tr><th>Loja</th><th>Filial</th><th>CC</th><th>Status</th><th>Criado em</th><th>Ações</th></tr></thead><tbody>${data.map(i=>`<tr><td>${esc(i.loja??"")}</td><td>${esc(i.filial??"")}</td><td>${esc(i.cc??i.centro_custo??"")}</td><td>${esc(i.status??"")}</td><td>${esc(new Date(i.created_at).toLocaleString("pt-BR"))}</td><td><button class="btn secondary" onclick="exportReport('${i.id}','pdf')">PDF</button> <button class="btn secondary" onclick="exportReport('${i.id}','xlsx')">Excel</button> <button class="btn danger" onclick="deleteInv('${i.id}')">Excluir</button></td></tr>`).join("")}</tbody></table></div></section>`;
}
async function renderCreateInventory(targetId, mobile=false){
 const target=$(targetId); target.innerHTML=`<section class="panel"><h2>Criar inventário</h2><div id="opcoes">Carregando filiais...</div></section>`;
 let ops=(await sb.from("inventario_opcoes_filiais").select("*").order("loja")).data;
 if(!ops) ops=(await sb.from("filiais").select("id,loja,filial,cc,descricao,cidade,estado").order("loja")).data || [];
 target.querySelector("#opcoes").innerHTML = `<div class="form"><label>Loja / Filial / CC<select id="${mobile?'mobInvOpt':'invOpt'}">${ops.map(o=>`<option value='${JSON.stringify(o).replaceAll("'","&apos;")}'>Loja ${esc(o.loja??"")} - Filial ${esc(o.filial??"")} - CC ${esc(o.cc??"")} - ${esc(o.descricao??"")}</option>`).join("")}</select></label><button class="btn success" onclick="${mobile?'createInventoryMobile()':'createInventory()'}">Criar Inventário</button></div>`;
}
async function createInventory(){await createInventoryBase("invOpt"); await loadInventariosList();}
async function createInventoryMobile(){await createInventoryBase("mobInvOpt"); state.showCreate=false; await renderMobile();}
async function createInventoryBase(id){
 const o=JSON.parse($(id).value);
 const row={loja:String(o.loja??""),filial:String(o.filial??""),cc:String(o.cc??""),setor:String(o.descricao??""),status:"aberto",responsavel_id:state.user.id};
 const {data,error}=await sb.from("inventarios").insert(row).select().single();
 if(error) return alert(error.message);
 try{await sb.rpc("atualizar_totais_inventario",{p_inventario_id:data.id});}catch(e){}
 alert("Inventário criado com sucesso.");
}
async function deleteInv(id){if(!confirm("Excluir inventário e todas as leituras vinculadas?"))return; const {error}=await sb.from("inventarios").delete().eq("id",id); if(error)alert(error.message); else loadInventariosList();}
async function renderReports(){ $("invArea").innerHTML=`<section class="panel"><h2>Relatórios</h2><p>Selecione um inventário na lista e exporte em PDF ou Excel.</p></section>`; }
async function getReport(id){
 const {data,error}=await sb.from("relatorio_inventario_completo").select("*").eq("inventario_id",id).order("resultado");
 if(error) throw error; return data||[];
}
async function exportReport(id,type){
 const rows=await getReport(id);
 if(type==="xlsx"){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Relatório");
  XLSX.writeFile(wb,`inventario_${id}.xlsx`);
 }else{
  const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:"landscape"});
  doc.setFontSize(18); doc.text("Relatório Profissional de Inventário Patrimonial",14,16);
  doc.setFontSize(9); doc.text(`Gerado em ${new Date().toLocaleString("pt-BR")}`,14,23);
  const resumo=["encontrado","divergente","nao_cadastrado","restante"].map(r=>`${r}: ${rows.filter(x=>x.resultado===r).length}`).join("   ");
  doc.text(resumo,14,30);
  doc.autoTable({startY:36,head:[["Resultado","Plaqueta","Descrição","Loja esp.","Filial esp.","CC esp.","Loja enc.","Filial enc.","CC enc.","Observações"]],body:rows.map(r=>[r.resultado,r.plaqueta_lida||r.plaq||r.plaqueta,r.descricao||r.desc,r.loja_esperada,r.filial_esperada,r.cc_esperado||r.centro_custo_esperado,r.loja_encontrada,r.filial_encontrada,r.cc_encontrado||r.centro_custo_encontrado,r.observacoes]) ,styles:{fontSize:7},headStyles:{fillColor:[16,35,63]}});
  doc.save(`relatorio_inventario_${id}.pdf`);
 }
}
async function usuarios(){ $("main").innerHTML=`<div class="page-title"><h1>Usuários</h1></div><section class="panel" id="users">Carregando...</section>`; const {data,error}=await sb.from("profiles").select("*").order("created_at",{ascending:false}); if(error)return $("users").innerHTML=`<p class=error>${esc(error.message)}</p>`; $("users").innerHTML=`<div class=table-wrap><table><thead><tr><th>Nome</th><th>Email</th><th>Perfil</th><th>Status</th></tr></thead><tbody>${data.map(u=>`<tr><td>${esc(u.nome)}</td><td>${esc(u.email)}</td><td>${esc(u.role||u.papel||u.perfil)}</td><td>${esc(u.status)}</td></tr>`).join("")}</tbody></table></div>`;}
function config(){ $("main").innerHTML=`<div class="page-title"><h1>Configurações</h1></div><section class="panel"><p>Supabase conectado: ${esc(window.SUPABASE_URL)}</p></section>`; }
async function renderMobile(){
 $("app").innerHTML=`<main class="mobile"><div class="mobile-head"><div><span style="color:#37b6a6;font-weight:900">PATRIMÔNIO MOBILE</span><br><strong>${esc(state.profile?.nome||state.user.email)}</strong></div>${isAdmin()?`<button class="btn secondary" onclick="navigate('dashboard')">← Voltar</button>`:""}</div>
 <section class="panel"><div class="row"><select id="mobInv" onchange="selectMobInv()"></select><button class="btn success" onclick="showCreateMobile()">+ Criar Inventário</button></div></section>
 <div id="mobileCreate"></div>
 <section class="scan-box"><button class="scan-button" onclick="startScan()">▣ Ler Plaqueta</button></section>
 <section class="panel"><div class="row"><input id="manualPlaqueta" placeholder="Digitar plaqueta"><button class="btn secondary" onclick="saveReading()">Salvar</button></div><div id="mobMsg"></div></section>
 <section class="panel"><strong id="lastStatus">AGUARDANDO LEITURA</strong><p id="lastDetail">Câmera ou digitação manual disponível.</p></section>
 <section><h3>Últimas leituras</h3><div class="recent" id="recent"></div></section>
 <div class="mobile-actions"><button class="btn success" onclick="nextReading()">Próxima</button><button class="btn danger" onclick="finishMobile()">Finalizar</button></div></main>`;
 await loadMobileInventories(); renderInstallButton();
}
async function loadMobileInventories(){
 const {data}=await loadInventarios(); const sel=$("mobInv"); sel.innerHTML=(data||[]).map(i=>`<option value="${i.id}">Loja ${esc(i.loja??"")} - Filial ${esc(i.filial??"")} - CC ${esc(i.cc??i.centro_custo??"")}</option>`).join("");
 state.currentInventory=data?.[0]||null; await loadRecent();
}
function selectMobInv(){state.currentInventory=state.inventories.find(i=>i.id===$("mobInv").value); loadRecent();}
function showCreateMobile(){state.showCreate=true; renderCreateInventory("mobileCreate",true);}
async function saveReading(value){
 const plaqueta=(value||$("manualPlaqueta").value||"").trim(); if(!plaqueta)return;
 if(!state.currentInventory) return $("mobMsg").innerHTML=`<p class=error>Selecione ou crie um inventário.</p>`;
 const {data,error}=await sb.rpc("registrar_leitura_inventario",{p_inventario_id:state.currentInventory.id,p_plaqueta:plaqueta});
 if(error) return $("mobMsg").innerHTML=`<p class=error>${esc(error.message)}</p>`;
 const row=Array.isArray(data)?data[0]:data;
 const res=row?.resultado||"encontrado";
 $("lastStatus").innerHTML=`<span class="pill ${res}">${esc(res)}</span>`;
 $("lastDetail").textContent=`Plaqueta ${plaqueta} registrada.`;
 $("manualPlaqueta").value=""; $("mobMsg").innerHTML=`<p class=ok>Leitura salva.</p>`;
 loadRecent();
}
async function loadRecent(){
 if(!state.currentInventory || !$("recent"))return;
 const {data}=await sb.from("leituras").select("plaqueta_lida,resultado,created_at").eq("inventario_id",state.currentInventory.id).order("created_at",{ascending:false}).limit(10);
 $("recent").innerHTML=(data&&data.length)?data.map(l=>`<div class=recent-item><strong>${esc(l.plaqueta_lida)}</strong><span class="pill ${l.resultado}">${esc(l.resultado)}</span></div>`).join(""):`<p class=muted>Nenhuma leitura registrada neste inventário.</p>`;
}
function nextReading(){ $("manualPlaqueta").value=""; $("lastStatus").textContent="AGUARDANDO LEITURA"; $("lastDetail").textContent="Câmera ou digitação manual disponível."; }
async function finishMobile(){
 if(!state.currentInventory)return;
 await sb.from("inventarios").update({status:"finalizado"}).eq("id",state.currentInventory.id);
 showExportPopup(state.currentInventory.id);
}
function showExportPopup(id){
 const div=document.createElement("div"); div.className="modal-bg"; div.innerHTML=`<div class=modal><h2>Inventário finalizado</h2><p>Deseja exportar os relatórios agora?</p><div class=row><button class="btn primary" onclick="exportReport('${id}','pdf')">Exportar PDF</button><button class="btn secondary" onclick="exportReport('${id}','xlsx')">Exportar Excel</button><button class="btn danger" onclick="this.closest('.modal-bg').remove()">Fechar</button></div></div>`; document.body.appendChild(div);
}
async function startScan(){
 if(!("BarcodeDetector" in window)){alert("Use a câmera pelo navegador compatível ou digite manualmente.");return;}
 try{
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  const video=document.createElement("video"); video.srcObject=stream; video.play();
  const detector=new BarcodeDetector({formats:["code_128","code_39","ean_13","ean_8","itf"]});
  let tries=0; const timer=setInterval(async()=>{tries++; const codes=await detector.detect(video).catch(()=>[]); if(codes[0]){clearInterval(timer); stream.getTracks().forEach(t=>t.stop()); saveReading(codes[0].rawValue);} if(tries>80){clearInterval(timer);stream.getTracks().forEach(t=>t.stop());alert("Não foi possível ler. Digite manualmente.");}},250);
 }catch(e){alert("Não foi possível abrir a câmera: "+e.message);}
}
function renderInstallButton(){
 if(!state.deferredPrompt || $("installBtn")) return;
 const b=document.createElement("button"); b.id="installBtn"; b.className="install-button-floating"; b.textContent="Baixar aplicativo"; b.onclick=async()=>{await state.deferredPrompt.prompt(); state.deferredPrompt=null; b.remove();}; document.body.appendChild(b);
}
init();
</script>
</body>
</html>
